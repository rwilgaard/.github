name: Go Alfred Release

# Reusable release workflow shared across alfred-* workflows.
# The binary name is derived from the calling repository's name
# (github.event.repository.name), which matches PROJECT_NAME in each Makefile.
#
# Call it from a repo with:
#
#   permissions:
#     contents: write
#   jobs:
#     release:
#       uses: rwilgaard/.github/.github/workflows/go-alfred-release.yaml@v1
on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-release:
    runs-on: macos-26
    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Unshallow
        run: git fetch --prune --unshallow

      - name: "Validates GO releaser config"
        uses: goreleaser/goreleaser-action@v7
        with:
          args: check

      - name: Build Alfred workflow
        run: |
          make build

      - name: Create universal binary
        run: |
          make universal-binary

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: universal-binary
          path: workflow/${{ github.event.repository.name }}

  release:
    needs: build-release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Download artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: universal-binary
          path: download

      - name: Copy binary into workflow
        run: |
          test -f download/${{ github.event.repository.name }} && cp download/${{ github.event.repository.name }} workflow/${{ github.event.repository.name }}
          chmod +x workflow/${{ github.event.repository.name }}
          rm -rf download

      - name: Package Alfred workflow
        run: |
          make zip-alfred

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
